name: CI

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      program_id:
        description: "On-chain program ID to deploy/verify"
        required: true
        type: string
      cluster:
        description: "Target cluster"
        required: true
        default: devnet
        type: choice
        options:
          - devnet
      skip_deploy:
        description: "Skip deploy (program already deployed)"
        required: false
        default: false
        type: boolean
      submit_remote:
        description: "Submit OtterSec remote verification job"
        required: false
        default: false
        type: boolean

env:
  CARGO_TERM_COLOR: always
  PACKAGE_MANAGER: yarn
  SOLANA_VERSION: 3.1.12
  ANCHOR_VERSION: 0.32.1
  LIBRARY_NAME: herald_privacy_registry
  BASE_IMAGE: solanafoundation/solana-verifiable-build:3.1.12
  DEVNET_RPC: https://api.devnet.solana.com

jobs:
  lint:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: target

      - name: Check formatting
        run: cargo fmt --check

  build:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    name: Build Program
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install Solana CLI
        run: sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"

      - name: Add Solana to PATH
        run: echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor CLI from source
        run: |
          cargo install --git https://github.com/solana-foundation/anchor --tag v${{ env.ANCHOR_VERSION }} anchor-cli --locked

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: target

      - name: Build
        run: cargo build-sbf --manifest-path programs/herald-privacy-registry/Cargo.toml -- --release

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: solana-program-so
          path: target/deploy/herald_privacy_registry.so
          retention-days: 7

  test:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    name: Test Suite
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install Solana CLI
        run: sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"

      - name: Add Solana to PATH
        run: echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor CLI from source
        run: |
          cargo install --git https://github.com/solana-foundation/anchor --tag v${{ env.ANCHOR_VERSION }} anchor-cli --locked

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn

      - name: Install dependencies
        run: yarn install

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: target

      - name: Build IDL
        run: anchor build

      - name: Run tests
        run: anchor test --skip-local-validator
        timeout-minutes: 15

  verify:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    name: Deterministic Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install solana-verify
        run: cargo install solana-verify --locked

      - name: Deterministic build
        run: solana-verify build --library-name ${{ env.LIBRARY_NAME }} --base-image ${{ env.BASE_IMAGE }}

      - name: Upload deterministic artifact
        uses: actions/upload-artifact@v4
        with:
          name: solana-verified-program-so
          path: target/deploy/herald_privacy_registry.so
          retention-days: 90

  audit:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        run: cargo audit
        continue-on-error: true

  release:
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'
    name: Release Program
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get tag
        id: get_tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install Solana CLI
        run: sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"

      - name: Add Solana to PATH
        run: echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor CLI from source
        run: |
          cargo install --git https://github.com/solana-foundation/anchor --tag v${{ env.ANCHOR_VERSION }} anchor-cli --locked

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn

      - name: Install dependencies
        run: yarn install

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: target

      - name: Install solana-verify
        run: cargo install solana-verify --locked

      - name: Build IDL
        run: anchor build

      - name: Deterministic build
        run: solana-verify build --library-name ${{ env.LIBRARY_NAME }} --base-image ${{ env.BASE_IMAGE }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: herald-privacy-registry-${{ steps.get_tag.outputs.TAG }}
          path: |
            target/deploy/herald_privacy_registry.so
            target/idl/herald_privacy_registry.json
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            target/deploy/herald_privacy_registry.so
            target/idl/herald_privacy_registry.json
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-and-verify:
    if: github.event_name == 'workflow_dispatch'
    name: Deploy & Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install Solana CLI
        run: sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install)"

      - name: Add Solana to PATH
        run: echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install solana-verify
        run: cargo install solana-verify --locked

      - name: Setup deployer keypair
        env:
          DEPLOYER_KEYPAIR_JSON: ${{ secrets.DEPLOYER_KEYPAIR }}
        run: |
          if [ -z "$DEPLOYER_KEYPAIR_JSON" ]; then
            echo "No DEPLOYER_KEYPAIR secret set — skipping"
            echo "HAS_KEYPAIR=false" >> "$GITHUB_ENV"
            exit 0
          fi
          mkdir -p "$HOME/.config/solana"
          echo "$DEPLOYER_KEYPAIR_JSON" > "$HOME/.config/solana/id.json"
          chmod 600 "$HOME/.config/solana/id.json"
          solana config set --keypair "$HOME/.config/solana/id.json"
          DEPLOYER_PUBKEY=$(solana-keygen pubkey)
          echo "DEPLOYER_PUBKEY=$DEPLOYER_PUBKEY" >> "$GITHUB_ENV"
          echo "HAS_KEYPAIR=true" >> "$GITHUB_ENV"

      - name: Deterministic build
        run: solana-verify build --library-name ${{ env.LIBRARY_NAME }} --base-image ${{ env.BASE_IMAGE }}

      - name: Deploy
        run: |
          if [ "${{ inputs.skip_deploy }}" == "true" ]; then
            echo "⏭️ Deploy skipped"
            exit 0
          fi
          if [ ! -f "$HOME/.config/solana/id.json" ]; then
            echo "⏭️ No deployer keypair — skipping deploy"
            exit 0
          fi
          solana program deploy target/deploy/${{ env.LIBRARY_NAME }}.so \
            -u ${{ env.DEVNET_RPC }} \
            --program-id ${{ inputs.program_id }} \
            --with-compute-unit-price 100000

      - name: Verify against repository
        run: |
          if [ ! -f "$HOME/.config/solana/id.json" ]; then
            echo "⏭️ No deployer keypair — skipping verify"
            exit 0
          fi
          REPO_URL="https://github.com/${{ github.repository }}"
          solana-verify verify-from-repo \
            -u ${{ env.DEVNET_RPC }} \
            --program-id ${{ inputs.program_id }} \
            "$REPO_URL"

      - name: Submit remote verification job
        run: |
          if [ "${{ inputs.submit_remote }}" != "true" ]; then
            echo "⏭️ Remote job not requested"
            exit 0
          fi
          if [ ! -f "$HOME/.config/solana/id.json" ]; then
            echo "⏭️ No deployer keypair — skipping remote job"
            exit 0
          fi
          solana-verify remote submit-job \
            --program-id ${{ inputs.program_id }} \
            --uploader "${{ env.DEPLOYER_PUBKEY }}"

      - name: Summary
        run: |
          echo "## Deploy & Verify Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Program ID** | \`${{ inputs.program_id }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Cluster** | ${{ inputs.cluster }} |" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ env.HAS_KEYPAIR }}" == "true" ]; then
            echo "| **Deployer** | \`${{ env.DEPLOYER_PUBKEY }}\` |" >> "$GITHUB_STEP_SUMMARY"
            if [ "${{ inputs.skip_deploy }}" == "false" ]; then
              echo "| **Deploy** | ✅ Deployed |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| **Deploy** | ⏭️ Skipped |" >> "$GITHUB_STEP_SUMMARY"
            fi
            echo "| **Verify** | ✅ Build data uploaded on-chain |" >> "$GITHUB_STEP_SUMMARY"
            if [ "${{ inputs.submit_remote }}" == "true" ]; then
              echo "| **Remote job** | ✅ Submitted |" >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "| **Deployer** | ⏭️ Not configured |" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "**Next steps:** Add \`DEPLOYER_KEYPAIR\` as a GitHub Actions secret (raw JSON keypair content)." >> "$GITHUB_STEP_SUMMARY"
          fi
