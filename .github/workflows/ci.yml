name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  PACKAGE_MANAGER: yarn
  SOLANA_VERSION: 3.1.12
  ANCHOR_VERSION: 0.32.1

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: target

      - name: Check formatting
        run: cargo fmt --check

  build:
    name: Build Program
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install Solana CLI
        run: sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install.sh)"

      - name: Install Anchor CLI from source
        run: |
          cargo install --git https://github.com/solana-foundation/anchor --tag v${{ env.ANCHOR_VERSION }} anchor-cli --locked

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: target

      - name: Build release
        run: cargo build-sbf --release --manifest-path programs/herald-privacy-registry/Cargo.toml

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: solana-program-so
          path: target/deploy/herald_privacy_registry.so
          retention-days: 7

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install Solana CLI
        run: sh -c "$(curl -sSfL https://release.anza.xyz/v${{ env.SOLANA_VERSION }}/install.sh)"

      - name: Install Anchor CLI from source
        run: |
          cargo install --git https://github.com/solana-foundation/anchor --tag v${{ env.ANCHOR_VERSION }} anchor-cli --locked

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn

      - name: Install dependencies
        run: yarn install

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: target

      - name: Build IDL
        run: anchor build

      - name: Run tests
        run: anchor test --skip-local-validator
        timeout-minutes: 15

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        run: cargo audit
        continue-on-error: true
