name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  SOLANA_VERSION: 2.1.21
  ANCHOR_VERSION: 0.32.1

jobs:
  release:
    name: Release Program
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get tag
        id: get_tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Set up Anchor and Solana
        uses: metadaoproject/setup-anchor@v3.1
        with:
          anchor-version: ${{ env.ANCHOR_VERSION }}
          solana-cli-version: ${{ env.SOLANA_VERSION }}
          node-version: "20"

      - name: Install dependencies
        run: yarn install

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: target

      - name: Build release
        run: anchor build

      - name: Build SBF
        run: cargo build-sbf --release --manifest-path programs/herald-privacy-registry/Cargo.toml

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: herald-privacy-registry-${{ steps.get_tag.outputs.TAG }}
          path: |
            target/deploy/herald_privacy_registry.so
            target/idl/herald_privacy_registry.json
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            target/deploy/herald_privacy_registry.so
            target/idl/herald_privacy_registry.json
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # NOTE: Actual deployment to devnet/mainnet should be done manually or via
  # a separate deployment pipeline with proper approval gates and multisig
  # signing for production. See README.md for deployment instructions.
